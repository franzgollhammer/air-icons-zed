<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#82D2CE"/>
      <stop offset="55%" stop-color="#AAA0FA"/>
      <stop offset="100%" stop-color="#E394DC"/>
    </linearGradient>
    <linearGradient id="folderBackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#82D2CE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E394DC" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="bgGrad2" cx="30%" cy="25%" r="95%">
      <stop offset="0%" stop-color="#2A2A34"/>
      <stop offset="60%" stop-color="#1E1E24"/>
      <stop offset="100%" stop-color="#141418"/>
    </radialGradient>
    <filter id="softGlow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (identical to Theme icon) -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bgGrad2)"/>

  <!-- Subtle air flow arcs (shared signature element) -->
  <path d="M 38 54 Q 128 28, 218 54" stroke="#87C3FF" stroke-width="1.5" fill="none" opacity="0.25"/>
  <path d="M 52 72 Q 128 50, 204 72" stroke="#AAA0FA" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- File tabs sticking up from behind folder (like file type icons) -->
  <rect x="74"  y="78"  width="28" height="36" rx="5" fill="#F8C762"/>
  <rect x="110" y="72"  width="28" height="42" rx="5" fill="#A8CC7C"/>
  <rect x="146" y="78"  width="28" height="36" rx="5" fill="#E394DC"/>

  <!-- Back folder (subtle depth) -->
  <path d="M 60 118 L 104 118 L 120 134 L 196 134 L 196 204 Q 196 212 188 212 L 68 212 Q 60 212 60 204 Z"
        fill="url(#folderBackGrad)" opacity="0.5"/>

  <!-- Front folder (main element) -->
  <g filter="url(#softGlow2)">
    <path d="M 52 128 L 100 128 L 118 146 L 204 146 L 204 212 Q 204 220 196 220 L 60 220 Q 52 220 52 212 Z"
          fill="url(#folderGrad)"/>
  </g>

  <!-- Subtle highlight along folder top edge -->
  <path d="M 52 128 L 100 128 L 118 146 L 204 146" stroke="#D6D6DD" stroke-width="1.5" fill="none" opacity="0.35"/>
</svg>
